<!DOCTYPE html>
<html lang="en">

<head>
    <title>Compliment Machine ✨</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>✨ Compliment Machine</h1>
        <p class="subtitle">Enter your name & feel amazing</p>

        <div class="input-row">
            <input type="text" id="nameInput" placeholder="Your name..." />
            <button onclick="generate()">Compliment me!</button>
        </div>

        <div class="card" id="card">
            <p id="compliment">Your compliment appears here...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
